name: Build and Release Platform-Specific Bundles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read manifest metadata
        id: meta
        run: |
          echo "version_chrome=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"
          echo "name_chrome=$(jq -r .name manifest.json)" >> "$GITHUB_OUTPUT"
          echo "version_firefox=$(jq -r .version manifest-firefox.json)" >> "$GITHUB_OUTPUT"
          echo "name_firefox=$(jq -r .name manifest-firefox.json)" >> "$GITHUB_OUTPUT"

      - name: Build Chrome ZIP
        id: pack-chrome
        run: |
          ZIP="show-country-${{ steps.meta.outputs.version_chrome }}-${{ github.run_number }}.zip"
          zip -r "$ZIP" manifest.json service_worker.js resolve_core.js content icons LICENSE README.md
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Build Firefox ZIP
        id: pack-firefox
        run: |
          ZIP="show-country-${{ steps.meta.outputs.version_firefox }}-${{ github.run_number }}.zip"
          zip -r "$ZIP" manifest-firefox.json service_worker.js resolve_core.js content icons LICENSE README.md
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version_chrome }}
          # Use a comprehensive name that includes both names and the version
          name: ${{ steps.meta.outputs.name_chrome }} ${{ steps.meta.outputs.version_chrome }} (build ${{ github.run_number }})
          body: |
            ### 🚀 New Release: ${{ steps.meta.outputs.name_chrome }} ${{ steps.meta.outputs.version_chrome }}
            
            This release includes builds optimized for both Chrome and Firefox.
            
            **📦 Instructions for Chrome (Manifest: manifest.json):**
            1. Download the Chrome ZIP bundle.
            2. Extract it.
            3. In Chrome open `chrome://extensions` → enable **Developer mode** → **Load unpacked** → select the **extracted folder** (the directory that contains `manifest.json`).

            **🦊 Instructions for Firefox (Manifest: manifest-firefox.json):**
            1. Download the Firefox ZIP bundle.
            2. Extract it.
            3. In Firefox, use the Add-ons Manager or a developer management console to load the extension from the **extracted folder** (the directory that contains `manifest-firefox.json`).


          files: |
            ${{ steps.pack-chrome.outputs.zip }}
            ${{ steps.pack-firefox.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}