name: Build and Release Platform-Specific Bundles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read manifest metadata
        id: meta
        run: |
          echo "version_chrome=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"
          echo "name_chrome=$(jq -r .name manifest.json)" >> "$GITHUB_OUTPUT"
          echo "version_firefox=$(jq -r .version manifest-firefox.json)" >> "$GITHUB_OUTPUT"
          echo "name_firefox=$(jq -r .name manifest-firefox.json)" >> "$GITHUB_OUTPUT"

      - name: Build Chrome ZIP
        id: pack-chrome
        run: |
          VER="${{ steps.meta.outputs.version_chrome }}"
          RUN="${{ github.run_number }}"
          ZIP="show-country-chrome-${VER}-${RUN}.zip"
          rm -rf pack-chrome
          mkdir -p pack-chrome
          cp manifest.json service_worker.js resolve_core.js LICENSE README.md pack-chrome/
          cp -r content icons pack-chrome/
          (cd pack-chrome && zip -r "../$ZIP" .)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Build Firefox ZIP
        id: pack-firefox
        run: |
          RUN="${{ github.run_number }}"
          rm -rf pack-firefox
          mkdir -p pack-firefox
          cp manifest-firefox.json pack-firefox/manifest.json
          cp service_worker.js resolve_core.js LICENSE README.md pack-firefox/
          cp -r content icons pack-firefox/
          # AMO rejects re-uploading the same manifest version; append run id (fourth segment is allowed).
          BASE="$(jq -r .version pack-firefox/manifest.json)"
          FF_VER="${BASE}.${RUN}"
          jq --arg v "$FF_VER" '.version = $v' pack-firefox/manifest.json > /tmp/mfj && mv /tmp/mfj pack-firefox/manifest.json
          ZIP="show-country-firefox-${FF_VER}-${RUN}.zip"
          (cd pack-firefox && zip -r "../$ZIP" .)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "ff_manifest_version=$FF_VER" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Sign Firefox add-on (Mozilla AMO, unlisted)
        id: sign-firefox
        env:
          AMO_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "${AMO_ISSUER:-}" ] || [ -z "${AMO_SECRET:-}" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "AMO credentials not configured; skipping signing. Add secrets AMO_JWT_ISSUER and AMO_JWT_SECRET (see docs/MOZILLA_SIGNING.md)."
            exit 0
          fi
          npm config set registry https://registry.npmjs.org/
          npm ci
          npx web-ext sign \
            -s pack-firefox \
            -a amo-artifacts \
            --api-key "$AMO_ISSUER" \
            --api-secret "$AMO_SECRET" \
            --channel unlisted \
            --timeout 120000 \
            --approval-timeout 600000
          XPI=$(find amo-artifacts -maxdepth 1 -type f -name '*.xpi' | head -1)
          if [ -z "$XPI" ]; then
            echo "Signing finished but no .xpi found in amo-artifacts"
            ls -la amo-artifacts
            exit 1
          fi
          VER="$(jq -r .version pack-firefox/manifest.json)"
          RUN="${{ github.run_number }}"
          OUT="show-country-firefox-signed-${VER}-${RUN}.xpi"
          cp "$XPI" "$OUT"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "xpi=$OUT" >> "$GITHUB_OUTPUT"
          echo "Built $OUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version_chrome }}-build.${{ github.run_number }}
          name: ${{ steps.meta.outputs.name_chrome }} ${{ steps.meta.outputs.version_chrome }} (build ${{ github.run_number }})
          body: |
            This release includes separate **Chrome** and **Firefox** (Manifest V3) ZIP bundles.

            **Chrome:** download `show-country-chrome-…zip`, extract, open `chrome://extensions` → Developer mode → **Load unpacked** → select the folder that contains `manifest.json`.

            **Firefox (121+), unsigned:** download `show-country-firefox-…zip`, **extract** the ZIP (do not use “Install add-on from file” on the unsigned ZIP). Open `about:debugging#/runtime/this-firefox` → **Load Temporary Add-on…** → select **`manifest.json`** inside the extracted folder.

            **Firefox / LibreWolf, signed:** if this repo has [AMO signing](https://github.com/${{ github.repository }}/blob/main/docs/MOZILLA_SIGNING.md) configured, a **`show-country-firefox-signed-…xpi`** is also attached. Use **Add-ons → Install Add-on From File** and choose that `.xpi` for a normal permanent install.

          files: |
            ${{ steps.pack-chrome.outputs.zip }}
            ${{ steps.pack-firefox.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach signed Firefox XPI to release
        if: steps.sign-firefox.outputs.signed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.meta.outputs.version_chrome }}-build.${{ github.run_number }}" \
            "${{ steps.sign-firefox.outputs.xpi }}" \
            --repo "${{ github.repository }}" \
            --clobber
